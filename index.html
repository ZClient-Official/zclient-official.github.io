<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="XYPop-BA-QhxT_4kY_DWgxC23knXE4UK7dTLdCW4Cqo" />
    
    <title>ZClient | The Most Powerful Utility for Minecraft</title>
    <meta name="description" content="Undetectable by design. Built for players who play to win. ZClient is the ultimate 1.21.1 utility.">

    <style>
        :root {
            --primary: #6366f1; /* Prestige-style Purple/Blue */
            --bg: #050508;
            --card-bg: #0b0b12;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Background Glow Effect */
        .glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 600px;
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        nav {
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }

        .hero {
            text-align: center;
            margin-top: 100px;
            max-width: 800px;
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin: 20px 0 40px;
        }

        /* The Login/Download Card */
        .auth-container {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .features {
            display: flex;
            gap: 20px;
            margin-top: 80px;
            padding: 40px;
        }

        .feature-tag {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: inline-block;
        }

        .hidden { display: none; }
        #error-msg { color: #ff4b4b; margin-top: 15px; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow"></div>
    
    <nav>
        <div class="logo">ZCLIENT</div>
        <div style="color: var(--text-dim);">1.21.11 Update available</div>
    </nav>

    <div class="hero">
        <span class="feature-tag">NEW TECHNOLOGY</span>
        <h1>The most powerful<br>utility for Minecraft.</h1>
        <p>Undetectable by design. Inside the game in 60 seconds.<br>Built for players who play to win.</p>

        <center>
            <div class="auth-container">
                <div id="auth-form">
                    <input type="email" id="email" placeholder="Email address">
                    <input type="password" id="password" placeholder="Password">
                    <button class="btn" id="login-btn" onclick="handleLogin()">Get Started — Free</button>
                    <div id="error-msg"></div>
                </div>

                <div id="dashboard" class="hidden">
                    <h2 style="margin-top:0">Access Granted</h2>
                    <p style="font-size: 0.9rem">Your license is active.</p>
                    <button class="btn" onclick="window.location.href='YOUR_LINK'">Download ZClient.exe</button>
                </div>
            </div>
        </center>
    </div>

    <div class="features">
        <div style="text-align:left">
            <span style="color:var(--primary)">✓</span> Fabric 1.21-1.21.11
        </div>
        <div style="text-align:left">
            <span style="color:var(--primary)">✓</span> Windows 10+
        </div>
        <div style="text-align:left">
            <span style="color:var(--primary)">✓</span> Instant Delivery
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bfddlxzuopacmxafdayn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dsNXgQktKqzg1T47_qBfWA_y3mxsHSD'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            btn.innerText = "Verifying...";
            
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorDiv.innerText = error.message;
                btn.innerText = "Get Started — Free";
            } else {
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
