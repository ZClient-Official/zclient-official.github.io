<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZClient | The Most Powerful Utility</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #050508;
            --card: #0d0d15;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Hero Styling */
        .hero h1 {
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .btn-group { display: flex; gap: 15px; margin-top: 30px; }

        .btn {
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-transform: uppercase;
        }

        .btn-buy { background: var(--primary); color: white; }
        .btn-login { background: transparent; color: white; border: 1px solid #222; }
        .btn-buy:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); transform: translateY(-2px); }

        /* Modal / Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Checkout Card Design (image_f4fc45 style) */
        .checkout-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 800px;
            display: flex;
            gap: 40px;
            border: 1px solid #1a1a2e;
        }

        .order-summary { flex: 1; border-right: 1px solid #1a1a2e; padding-right: 40px; }
        .payment-form { flex: 1.2; }

        .price-tag { font-size: 2.5rem; font-weight: 800; margin: 20px 0; }
        
        .payment-method {
            background: #11111d;
            border: 1px solid #1a1a2e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .payment-method:hover { border-color: var(--primary); }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: white;
        }

        .pay-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        .close-btn { position: absolute; top: 30px; right: 40px; cursor: pointer; color: var(--text-dim); }

    </style>
</head>
<body>

    <div class="hero">
        <center>
            <h1>ZCLIENT</h1>
            <p style="color: var(--text-dim)">One step from dominating.</p>
            <div class="btn-group">
                <button class="btn btn-buy" onclick="showModal('checkoutModal')">Buy Now — €9.99</button>
                <button class="btn btn-login" onclick="showModal('loginModal')">Log In</button>
            </div>
        </center>
    </div>

    <div id="checkoutModal" class="overlay">
        <span class="close-btn" onclick="hideModal('checkoutModal')">CLOSE [X]</span>
        <div class="checkout-card">
            <div class="order-summary">
                <span style="color:var(--primary); font-weight:bold;">● Secure checkout</span>
                <h2 style="font-size: 2rem;">One step from dominating.</h2>
                <div style="background:#000; padding:20px; border-radius:15px; margin-top:20px;">
                    <p style="margin:0; color:var(--text-dim)">ZClient Lifetime</p>
                    <div class="price-tag">€9.99</div>
                    <p style="font-size:0.8rem; color:var(--text-dim)">✓ Instant delivery<br>✓ 24/7 support</p>
                </div>
            </div>
            <div class="payment-form">
                <h3>Complete your purchase</h3>
                <input type="email" placeholder="Email Address">
                
                <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:10px;">PAYMENT METHOD</p>
                <div class="payment-method">
                    <input type="radio" name="pay" checked> <span>Card & more (Stripe)</span>
                </div>
                <div class="payment-method">
                    <input type="radio" name="pay"> <span>PayPal</span>
                </div>
                <div class="payment-method">
                    <input type="radio" name="pay"> <span>Cryptocurrency</span>
                </div>

                <button class="btn pay-btn" onclick="alert('Redirecting to Payment Gateway...')">Pay €9.99 →</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="overlay">
        <span class="close-btn" onclick="hideModal('loginModal')">CLOSE [X]</span>
        <div style="background:var(--card); padding:40px; border-radius:20px; width:350px; text-align:center; border: 1px solid #1a1a2e;">
            <h2>Log In</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="btn btn-buy" style="width:100%">Authenticate</button>
        </div>
    </div>

    <script>
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>

</body>
</html>
