<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="XYPop-BA-QhxT_4kY_DWgxC23knXE4UK7dTLdCW4Cqo" />
    
    <title>ZClient | Premium Minecraft Utility</title>

    <style>
        :root {
            --primary: #7c3aed; /* Purple Theme */
            --bg: #030303;
            --card: #0a0a0a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(124, 58, 237, 0.1), transparent 70%);
            z-index: -1;
        }

        .hero h1 {
            font-size: 5rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }

        .btn-outline { background: transparent; color: white; border: 1px solid #333; }
        .btn-outline:hover { border-color: white; }

        /* Login Modal (Popup) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            border: 1px solid #222;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .close-btn {
            margin-top: 15px;
            color: #555;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow"></div>

    <div class="hero">
        <center>
            <h1>ZCLIENT</h1>
            <p>The next generation of ghost clients.</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="window.location.href='YOUR_PAYMENT_LINK'">Buy Now — $9.99</button>
                <button class="btn btn-outline" onclick="openModal()">Login</button>
            </div>
        </center>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Member Login</h2>
            
            <div id="auth-form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button class="btn btn-primary" style="width:100%" id="login-btn" onclick="handleLogin()">Sign In</button>
                <div id="error-msg" style="color:red; margin-top:10px; font-size:0.8rem;"></div>
            </div>

            <div id="dashboard" class="hidden">
                <p style="color:#4ade80">Access Authorized!</p>
                <button class="btn btn-primary" style="width:100%" onclick="window.location.href='YOUR_DOWNLOAD_LINK'">Download .EXE</button>
            </div>

            <div class="close-btn" onclick="closeModal()">Back to home</div>
        </div>
    </div>

    <script>
        // Supabase Init
        const SUPABASE_URL = 'https://bfddlxzuopacmxafdayn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dsNXgQktKqzg1T47_qBfWA_y3mxsHSD'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function openModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('loginModal').style.display = 'none'; }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            btn.innerText = "Verifying...";
            
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.innerText = "Invalid credentials.";
                btn.innerText = "Sign In";
            } else {
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('modal-title').innerText = "Welcome Back";
            }
        }
    </script>
</body>
</html>
